services:
  # === CORE: Single Whisper engine on NVIDIA GPU ===
  speaches:
    container_name: speaches
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - STT_MODEL_TTL=-1
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=int8_float32
      - WHISPER__NUM_WORKERS=2
      - UNSTABLE_ORT_OPTS__EXCLUDE_PROVIDERS=["TensorrtExecutionProvider","CUDAExecutionProvider"]
      - LOG_LEVEL=info
      - ENABLE_UI=false
      - PRELOAD_MODELS=["Systran/faster-whisper-large-v3","speaches-ai/Kokoro-82M-v1.0-ONNX"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    networks:
      - whisper_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # === TTS: Pocket TTS German (CPU, OpenAI-compatible) ===
  pockettts-de:
    container_name: pockettts-de
    build:
      context: ../pocket-tts-openai_streaming_server
      dockerfile: Dockerfile
    image: pockettts-openai-server:latest
    restart: unless-stopped
    ports:
      - "49112:49112"
    environment:
      - POCKET_TTS_HOST=0.0.0.0
      - POCKET_TTS_PORT=49112
      - POCKET_TTS_VOICES_DIR=/app/voices
      - POCKET_TTS_LOG_LEVEL=INFO
      - POCKET_TTS_STREAM_DEFAULT=true
      - POCKET_TTS_LANGUAGE=german_24l
      - POCKET_TTS_QUANTIZE=false
      - POCKET_TTS_VOICE_CACHE_DIR=/app/voice_cache
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - pockettts-cache:/home/pockettts/.cache/huggingface
      - pockettts-voice-cache-de:/app/voice_cache
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:49112/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - whisper_net


  # === BRIDGE: Wyoming German pipeline (STT + TTS) ===
  wyoming-openai-de:
    container_name: wyoming-openai-de
    image: ghcr.io/roryeckel/wyoming_openai:latest
    restart: unless-stopped
    ports:
      - "10300:10300"
    environment:
      - WYOMING_URI=tcp://0.0.0.0:10300
      - WYOMING_LOG_LEVEL=INFO
      - WYOMING_LANGUAGES=de
      - STT_OPENAI_URL=http://speaches:8000/v1
      - STT_MODELS=Systran/faster-whisper-large-v3
      - STT_BACKEND=SPEACHES
      - STT_PROMPT=${WHISPER_PROMPT}
      - TTS_OPENAI_URL=http://pockettts-de:49112/v1
      - TTS_MODELS=german_24l
      - TTS_BACKEND=OPENAI
      # --- Kokoro fallback (uncomment to switch back) ---
      # - TTS_OPENAI_URL=http://speaches:8000/v1
      # - TTS_MODELS=speaches-ai/Kokoro-82M-v1.0-ONNX
      # - TTS_BACKEND=SPEACHES
    depends_on:
      speaches:
        condition: service_healthy
      pockettts-de:
        condition: service_healthy
    networks:
      - whisper_net

  # === BRIDGE: Wyoming English pipeline (STT + Kokoro TTS via speaches) ===
  wyoming-openai-en:
    container_name: wyoming-openai-en
    image: ghcr.io/roryeckel/wyoming_openai:latest
    restart: unless-stopped
    ports:
      - "10301:10300"
    environment:
      - WYOMING_URI=tcp://0.0.0.0:10300
      - WYOMING_LOG_LEVEL=INFO
      - WYOMING_LANGUAGES=en
      - STT_OPENAI_URL=http://speaches:8000/v1
      - STT_MODELS=Systran/faster-whisper-large-v3
      - STT_BACKEND=SPEACHES
      - STT_PROMPT=${WHISPER_PROMPT_EN}
      - TTS_OPENAI_URL=http://speaches:8000/v1
      - TTS_MODELS=speaches-ai/Kokoro-82M-v1.0-ONNX
      - TTS_BACKEND=SPEACHES
    depends_on:
      speaches:
        condition: service_healthy
    networks:
      - whisper_net

  # === SUBTITLES: Bazarr ASR + Plex/Jellyfin webhooks ===
  subgen:
    container_name: subgen
    tty: true
    build:
      context: ..
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    environment:
      - WHISPER_API_URL=http://speaches:8000/v1/audio/transcriptions
      - WHISPER_API_MODEL=Systran/faster-whisper-large-v3
      - WHISPER_API_LANGUAGE=de
      - WEBHOOKPORT=9000
      - CONCURRENT_TRANSCRIPTIONS=2
      - WORD_LEVEL_HIGHLIGHT=False
      - DEBUG=True
      - USE_PATH_MAPPING=False
      - LRC_FOR_AUDIO_FILES=True
      - CUSTOM_REGROUP=cm_sl=84_sl=42++++++1
      - NAMESUBLANG=aa
      - SKIPIFINTERNALSUBLANG=eng
      - PROCADDEDMEDIA=True
      - PROCMEDIAONPLAY=False
      - PLEXTOKEN=${PLEX_TOKEN}
      - PLEXSERVER=${PLEX_SERVER}
      - JELLYFINTOKEN=${JELLYFIN_TOKEN}
      - JELLYFINSERVER=${JELLYFIN_SERVER}
    volumes:
      - "${TV}:/tv"
      - "${MOVIES}:/movies"
    ports:
      - "9000:9000"
    depends_on:
      speaches:
        condition: service_healthy
    networks:
      - whisper_net

volumes:
  hf-hub-cache:
  pockettts-cache:
  pockettts-voice-cache-de:

networks:
  whisper_net:
    driver: bridge
